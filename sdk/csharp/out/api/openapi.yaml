components:
  schemas:
    CoachMarkState:
      additionalProperties: false
      example:
        seenAt: 2000-01-23T04:56:07.000+00:00
        completedAt: 2000-01-23T04:56:07.000+00:00
        markKey: markKey
        id: id
        subjectId: subjectId
        status: status
      properties:
        id:
          format: guid
          type: string
        subjectId:
          format: guid
          type: string
        markKey:
          type: string
        status:
          type: string
        seenAt:
          format: date-time
          nullable: true
          type: string
        completedAt:
          format: date-time
          nullable: true
          type: string
      type: object
    UpdateCoachMarkRequest:
      additionalProperties: false
      description: Request body for updating a coach mark's status.
      example:
        status: status
      properties:
        status:
          description: "The target status (seen, completed, dismissed)."
          type: string
      type: object
    ConnectorStatusDto:
      additionalProperties: false
      description: |-
        DTO representing the current operational status of a data source connector
        (e.g. Dexcom, Glooko, Libre). Returned by the admin connector status endpoints.
      example:
        lastErrorAt: 2000-01-23T04:56:07.000+00:00
        stateMessage: stateMessage
        entriesLast24Hours: 6
        totalItemsBreakdown:
          key: 1
        isHealthy: true
        lastSuccessfulSync: 2000-01-23T04:56:07.000+00:00
        lastEntryTime: 2000-01-23T04:56:07.000+00:00
        name: name
        lastSyncAttempt: 2000-01-23T04:56:07.000+00:00
        id: id
        totalEntries: 0
        state: state
        itemsLast24HoursBreakdown:
          key: 5
        status: status
      properties:
        id:
          description: Unique identifier of the connector configuration.
          type: string
        name:
          description: "Human-readable connector name (e.g. \"Dexcom Share\", \"LibreLink\"\
            )."
          type: string
        status:
          description: "High-level status label (e.g. \"Active\", \"Error\", \"Disabled\"\
            )."
          type: string
        totalEntries:
          description: Total number of entries imported by this connector over its
            lifetime.
          format: int64
          type: integer
        lastEntryTime:
          description: Timestamp of the most recent entry imported by this connector.
          format: date-time
          nullable: true
          type: string
        entriesLast24Hours:
          description: Number of entries imported in the last 24 hours.
          format: int32
          type: integer
        state:
          description: Current operational state of the connector.
          type: string
        stateMessage:
          description: Optional message providing detail about the current state (e.g.
            error description).
          nullable: true
          type: string
        isHealthy:
          description: Whether the connector is considered healthy based on recent
            sync activity.
          type: boolean
        lastSyncAttempt:
          description: When the connector last attempted to sync
          format: date-time
          nullable: true
          type: string
        lastSuccessfulSync:
          description: When the connector last successfully completed a sync
          format: date-time
          nullable: true
          type: string
        lastErrorAt:
          description: When the last error occurred
          format: date-time
          nullable: true
          type: string
        totalItemsBreakdown:
          additionalProperties:
            format: int64
            type: integer
          description: |-
            Breakdown of total items processed by data type
            Keys are data type names (e.g., "Glucose", "Treatments", "Food")
          nullable: true
          type: object
        itemsLast24HoursBreakdown:
          additionalProperties:
            format: int32
            type: integer
          description: |-
            Breakdown of items processed in the last 24 hours by data type
            Keys are data type names (e.g., "Glucose", "Treatments", "Food")
          nullable: true
          type: object
      type: object
    DeviceCatalogEntry:
      additionalProperties: false
      example:
        name: name
        cgm: ""
        id: id
        category: InsulinPump
        manufacturer: manufacturer
      properties:
        id:
          type: string
        name:
          type: string
        manufacturer:
          type: string
        category:
          $ref: "#/components/schemas/DeviceCategory"
        cgm:
          allOf:
          - $ref: "#/components/schemas/CgmProperties"
          nullable: true
      type: object
    DeviceCategory:
      description: ""
      enum:
      - InsulinPump
      - CGM
      - GlucoseMeter
      - InsulinPen
      - SmartPen
      - Uploader
      type: string
      x-enumNames:
      - InsulinPump
      - CGM
      - GlucoseMeter
      - InsulinPen
      - SmartPen
      - Uploader
    InsulinFormulation:
      additionalProperties: false
      example:
        defaultPeak: 6
        curve: curve
        name: name
        defaultDia: 0.8008281904610115
        concentration: 1
        id: id
        category: RapidActing
      properties:
        id:
          type: string
        name:
          type: string
        category:
          $ref: "#/components/schemas/InsulinCategory"
        defaultDia:
          format: double
          type: number
        defaultPeak:
          format: int32
          type: integer
        curve:
          type: string
        concentration:
          format: int32
          type: integer
      type: object
    InsulinCategory:
      description: ""
      enum:
