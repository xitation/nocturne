      operationId: Bolus_GetById
      parameters:
      - description: The unique identifier of the record.
        explode: false
        in: path
        name: id
        required: true
        schema:
          format: guid
          type: string
        style: simple
        x-position: 1
      responses:
        "200":
          content:
            application/json:
