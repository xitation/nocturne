openapi: 3.0.0
info:
  description: Nocturne V4 API SDK
  title: Nocturne SDK
  version: 1.0.0
servers:
- url: /
paths:
  /api/v4/coach-marks:
    delete:
      operationId: CoachMark_DeleteAll
      responses:
        "200":
          content:
            application/octet-stream:
              schema:
                format: binary
                type: string
          description: ""
      summary: "Delete all coach mark states for the current user, resetting all tutorials."
      tags:
      - Coach Mark
      x-remote-type: command
      x-remote-invalidates:
      - GetAll
    get:
      operationId: CoachMark_GetAll
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/CoachMarkState"
                type: array
          description: ""
      summary: Get all coach mark states for the current user.
      tags:
      - Coach Mark
      x-remote-type: query
  /api/v4/coach-marks/{key}:
    patch:
      operationId: CoachMark_UpdateStatus
      parameters:
      - description: The coach mark key to update.
        explode: false
        in: path
        name: key
        required: true
        schema:
          type: string
        style: simple
        x-position: 1
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCoachMarkRequest"
        description: The new status value.
        required: true
        x-name: request
        x-position: 2
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoachMarkState"
          description: ""
      summary: Update a coach mark's status.
      tags:
      - Coach Mark
      x-remote-type: command
  /api/v4/connectors/status:
    get:
      operationId: ConnectorStatus_GetStatus
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/ConnectorStatusDto"
                type: array
          description: ""
      summary: Gets the current status and metrics for all registered connectors
      tags:
      - Connector Status
      x-remote-type: query
  /api/v4/devices/catalog:
    get:
      operationId: DeviceCatalog_GetCatalog
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/DeviceCatalogEntry"
                type: array
          description: ""
      summary: Get all known device models.
      tags:
      - Device Catalog
      x-remote-type: query
  /api/v4/devices/catalog/{category}:
    get:
      operationId: DeviceCatalog_GetCatalogByCategory
      parameters:
      - explode: false
        in: path
        name: category
        required: true
        schema:
          $ref: "#/components/schemas/DeviceCategory"
        style: simple
        x-position: 1
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/DeviceCatalogEntry"
                type: array
          description: ""
      summary: Get device models filtered by category.
      tags:
      - Device Catalog
  /api/v4/insulins/catalog:
    get:
      operationId: InsulinCatalog_GetCatalog
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/InsulinFormulation"
                type: array
          description: ""
      summary: Get all known insulin formulations.
      tags:
      - Insulin Catalog
      x-remote-type: query
  /api/v4/insulins/catalog/{category}:
    get:
      operationId: InsulinCatalog_GetCatalogByCategory
      parameters:
      - explode: false
        in: path
        name: category
        required: true
        schema:
          $ref: "#/components/schemas/InsulinCategory"
        style: simple
        x-position: 1
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/InsulinFormulation"
                type: array
          description: ""
      summary: Get insulin formulations filtered by category.
      tags:
      - Insulin Catalog
  /api/v4/platform/tenants:
    get:
      operationId: Platform_GetTenants
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/TenantDto"
                type: array
          description: ""
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
          description: ""
      summary: Returns all tenants the authenticated subject is a member of.
      tags:
      - Platform
      x-remote-type: query
    post:
      operationId: Platform_CreateTenant
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePlatformTenantRequest"
        required: true
        x-name: request
        x-position: 1
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantCreatedDto"
          description: ""
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
          description: ""
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
          description: ""
      summary: |-
        Creates a new tenant with the authenticated subject as owner.
        Requires OperatorConfiguration.AllowSelfServiceCreation to be enabled.
      tags:
      - Platform
      x-remote-type: command
      x-remote-invalidates:
      - GetTenants
  /api/v4/platform/transition-status:
    get:
      operationId: Platform_GetTransitionStatus
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransitionStatusDto"
          description: ""
      summary: |-
        Returns the current multitenancy configuration status.
        Used by the frontend to display subdomain URLs and transition notices.
      tags:
      - Platform
      x-remote-type: query
  /api/v4/setup/tenant:
    post:
      operationId: Setup_CreateTenant
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetupTenantRequest"
        required: true
        x-name: request
        x-position: 1
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SetupTenantResponse"
          description: ""
        "409":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
          description: ""
      summary: Create the first tenant on a fresh install. Only succeeds when zero
        tenants exist.
      tags:
      - Setup
      x-remote-type: command
  /api/v4/setup/validate-username:
    get:
      operationId: Setup_ValidateUsername
      parameters:
      - explode: true
        in: query
        name: username
        required: false
        schema:
          type: string
        style: form
        x-position: 1
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SlugValidationResult"
          description: ""
      summary: Check whether a username is available for the owner account.
      tags:
      - Setup
      x-remote-type: query
  /api/v4/setup/owner/options:
    post:
      operationId: Setup_OwnerOptions
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetupOwnerOptionsRequest"
        required: true
        x-name: request
        x-position: 1
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SetupOwnerOptionsResponse"
          description: ""
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
          description: ""
        "409":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
          description: ""
      summary: |-
        Generate passkey registration options for the first owner account.
        Guard: exactly one tenant must exist with zero non-system members.
      tags:
      - Setup
      x-remote-type: command
  /api/v4/setup/owner/complete:
    post:
      operationId: Setup_OwnerComplete
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetupOwnerCompleteRequest"
        required: true
        x-name: request
        x-position: 1
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SetupOwnerCompleteResponse"
          description: ""
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
          description: ""
        "409":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
          description: ""
      summary: |-
        Complete passkey registration for the first owner account.
        Verifies attestation, generates recovery codes, issues a full JWT session.
      tags:
      - Setup
      x-remote-type: command
  /api/v4/setup/owner/oidc:
    post:
      operationId: Setup_OwnerOidc
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetupOwnerOidcRequest"
        required: true
        x-name: request
        x-position: 1
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SetupOwnerOidcResponse"
          description: ""
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
          description: ""
        "409":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
          description: ""
      summary: |-
        Initiate OIDC-based owner creation. Creates the subject and owner role,
        then redirects to the OIDC provider to link an identity.
      tags:
      - Setup
      x-remote-type: command
  /api/v4/setup/oidc/callback:
    get:
      operationId: Setup_OidcCallback
      parameters:
      - explode: true
        in: query
        name: code
        required: false
        schema:
          nullable: true
          type: string
        style: form
        x-position: 1
      - explode: true
        in: query
        name: state
        required: false
        schema:
          nullable: true
          type: string
        style: form
        x-position: 2
      - explode: true
        in: query
        name: error
        required: false
        schema:
          nullable: true
          type: string
        style: form
        x-position: 3
      - explode: true
        in: query
        name: error_description
        required: false
        schema:
          nullable: true
          type: string
        style: form
        x-position: 4
      responses:
        "302":
          description: ""
      summary: |-
        OIDC callback for setup owner creation. Called by the OIDC provider after authentication.
        Links the identity, issues session cookies, and redirects to /setup.
      tags:
      - Setup
  /api/v4/insulin/calculations:
    get:
      description: "The `sort` parameter accepts exactly two values:\n- `timestamp_asc`\
        \ — oldest records first\n- `timestamp_desc` — newest records first (default)\n\
        \            \nUse `limit` and `offset` together for paginated access to large\
        \ result sets."
      operationId: BolusCalculation_GetAll
      parameters:
      - description: Inclusive start of the date range filter.
        explode: true
        in: query
        name: from
        required: false
        schema:
          format: date-time
          nullable: true
          type: string
        style: form
        x-position: 1
      - description: Inclusive end of the date range filter.
        explode: true
        in: query
        name: to
        required: false
        schema:
          format: date-time
          nullable: true
          type: string
        style: form
        x-position: 2
      - description: Maximum number of records to return. Defaults to `100`.
        explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 100
          format: int32
          type: integer
        style: form
        x-position: 3
      - description: Number of records to skip for pagination. Defaults to `0`.
        explode: true
        in: query
        name: offset
        required: false
        schema:
          default: 0
          format: int32
          type: integer
        style: form
        x-position: 4
      - description: Sort order for results by timestamp. Defaults to `timestamp_desc`.
        explode: true
        in: query
        name: sort
        required: false
        schema:
          default: timestamp_desc
          type: string
        style: form
        x-position: 5
      - description: Optional filter to restrict results to a specific device.
        explode: true
        in: query
        name: device
        required: false
        schema:
          nullable: true
          type: string
        style: form
        x-position: 6
      - description: Optional filter to restrict results to a specific data source.
        explode: true
        in: query
        name: source
        required: false
        schema:
          nullable: true
          type: string
        style: form
        x-position: 7
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedResponseOfBolusCalculation"
          description: ""
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
          description: ""
      summary: "Lists records with pagination, optional date range, device, and source\
        \ filtering."
      tags:
      - Bolus Calculation
      x-remote-type: query
    post:
      description: "`Timestamp` must be set on the mapped model; requests that resolve\
        \ to a default timestamp are rejected with `400 Bad Request`.\n          \
        \  \nOn success, responds with `201 Created` and a `Location` header containing\
        \ the URL of the newly created record."
      operationId: BolusCalculation_Create
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertBolusCalculationRequest"
        description: The data used to create the record.
        required: true
        x-name: request
        x-position: 1
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BolusCalculation"
          description: ""
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
          description: ""
      summary: Creates a new record and returns it with a `Location` header pointing
        to the created resource.
      tags:
      - Bolus Calculation
      x-remote-type: form
  /api/v4/insulin/calculations/{id}:
    delete:
      description: "Returns `204 No Content` on success, or `404 Not Found` if no\
        \ record with the given id exists."
      operationId: BolusCalculation_Delete
      parameters:
      - description: The unique identifier of the record to delete.
        explode: false
        in: path
        name: id
        required: true
        schema:
          format: guid
          type: string
        style: simple
        x-position: 1
      responses:
        "204":
          description: ""
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
          description: ""
      summary: Deletes a record by ID.
      tags:
      - Bolus Calculation
      x-remote-type: command
    get:
      description: Returns `404 Not Found` if no record with the given id exists.
      operationId: BolusCalculation_GetById
      parameters:
      - description: The unique identifier of the record.
        explode: false
        in: path
        name: id
        required: true
        schema:
          format: guid
          type: string
        style: simple
        x-position: 1
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BolusCalculation"
          description: ""
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
          description: ""
      summary: Retrieves a single record by its unique identifier.
      tags:
      - Bolus Calculation
      x-remote-type: query
    put:
      description: "Returns `404 Not Found` if no record with the given id exists.\n\
        \            \n`Timestamp` must be set on the mapped model; requests that\
        \ resolve to a default timestamp are rejected with `400 Bad Request`."
      operationId: BolusCalculation_Update
      parameters:
      - description: The unique identifier of the record to update.
        explode: false
        in: path
        name: id
        required: true
        schema:
          format: guid
          type: string
        style: simple
        x-position: 1
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertBolusCalculationRequest"
        description: The data to apply to the existing record.
        required: true
        x-name: request
        x-position: 2
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BolusCalculation"
          description: ""
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
          description: ""
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
          description: ""
      summary: Updates an existing record by ID and returns the updated record.
      tags:
      - Bolus Calculation
      x-remote-type: form
  /api/v4/insulin/boluses:
    get:
      description: "Response is cached for 90 seconds, varying by all query parameters."
      operationId: Bolus_GetAll
      parameters:
      - explode: true
        in: query
        name: from
        required: false
        schema:
          format: date-time
          nullable: true
          type: string
        style: form
        x-position: 1
      - explode: true
        in: query
        name: to
        required: false
        schema:
          format: date-time
          nullable: true
          type: string
        style: form
        x-position: 2
      - explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 100
          format: int32
          type: integer
        style: form
        x-position: 3
      - explode: true
        in: query
        name: offset
        required: false
        schema:
          default: 0
          format: int32
          type: integer
        style: form
        x-position: 4
      - explode: true
        in: query
        name: sort
        required: false
        schema:
          default: timestamp_desc
          type: string
        style: form
        x-position: 5
      - explode: true
        in: query
        name: device
        required: false
        schema:
          nullable: true
          type: string
        style: form
        x-position: 6
      - explode: true
        in: query
        name: source
        required: false
        schema:
          nullable: true
          type: string
        style: form
        x-position: 7
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedResponseOfBolus"
          description: ""
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
          description: ""
      tags:
      - Bolus
      x-remote-type: query
    post:
      description: "`Timestamp` must be set on the mapped model; requests that resolve\
        \ to a default timestamp are rejected with `400 Bad Request`.\n          \
        \  \nOn success, responds with `201 Created` and a `Location` header containing\
        \ the URL of the newly created record."
      operationId: Bolus_Create
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBolusRequest"
        description: The data used to create the record.
        required: true
        x-name: request
        x-position: 1
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bolus"
          description: ""
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
          description: ""
      summary: Creates a new record and returns it with a `Location` header pointing
        to the created resource.
      tags:
      - Bolus
      x-remote-type: form
  /api/v4/insulin/boluses/{id}:
    delete:
      description: "Returns `204 No Content` on success, or `404 Not Found` if no\
        \ record with the given id exists."
      operationId: Bolus_Delete
      parameters:
      - description: The unique identifier of the record to delete.
