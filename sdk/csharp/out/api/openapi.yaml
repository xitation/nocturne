                $ref: "#/components/schemas/Bolus"
          description: ""
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
          description: ""
      summary: Retrieves a single record by its unique identifier.
      tags:
      - Bolus
      x-remote-type: query
    put:
      description: "Returns `404 Not Found` if no record with the given id exists.\n\
        \            \n`Timestamp` must be set on the mapped model; requests that\
        \ resolve to a default timestamp are rejected with `400 Bad Request`."
      operationId: Bolus_Update
      parameters:
      - description: The unique identifier of the record to update.
        explode: false
        in: path
        name: id
        required: true
        schema:
          format: guid
          type: string
        style: simple
        x-position: 1
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBolusRequest"
        description: The data to apply to the existing record.
        required: true
        x-name: request
        x-position: 2
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bolus"
          description: ""
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
          description: ""
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
          description: ""
      summary: Updates an existing record by ID and returns the updated record.
      tags:
      - Bolus
      x-remote-type: form
  /api/v4/insulin/boluses/by-sync-id:
    delete:
      operationId: Bolus_DeleteBySyncIdentifier
      parameters:
      - explode: true
        in: query
        name: dataSource
        required: false
        schema:
          type: string
        style: form
        x-position: 1
      - explode: true
        in: query
        name: syncIdentifier
        required: false
        schema:
          type: string
        style: form
        x-position: 2
      responses:
        "204":
          description: ""
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
          description: ""
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
          description: ""
      summary: Delete a bolus by its external sync identifier (dataSource + syncIdentifier
        pair).
      tags:
      - Bolus
  /api/v4/connector-food-entries/import:
    post:
      operationId: ConnectorFoodEntries_ImportEntries
      requestBody:
        content:
          application/json:
            schema:
              items:
                $ref: "#/components/schemas/ConnectorFoodEntryImport"
              type: array
        required: true
        x-name: imports
        x-position: 1
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/ConnectorFoodEntry"
                type: array
          description: ""
      summary: Import connector food entries.
      tags:
      - Connector Food Entries
  /api/v4/foods:
    get:
      operationId: Foods_GetFoods
      parameters:
      - explode: true
        in: query
        name: find
        required: false
        schema:
          nullable: true
          type: string
        style: form
        x-position: 1
      - explode: true
        in: query
        name: count
        required: false
        schema:
          format: int32
          nullable: true
          type: integer
        style: form
        x-position: 2
      - explode: true
        in: query
        name: skip
        required: false
        schema:
          format: int32
          nullable: true
          type: integer
        style: form
        x-position: 3
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/Food"
