services:
  nocturne-postgres-server:
    image: "docker.io/library/postgres:17.6"
    environment:
      POSTGRES_HOST_AUTH_METHOD: "scram-sha-256"
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=scram-sha-256"
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: "${POSTGRES_DB}"
      POSTGRES_MIGRATOR_PASSWORD: "${POSTGRES_MIGRATOR_PASSWORD}"
      POSTGRES_APP_PASSWORD: "${POSTGRES_APP_PASSWORD}"
      POSTGRES_WEB_PASSWORD: "${POSTGRES_WEB_PASSWORD}"
    expose:
    - "5432"
    volumes:
    - type: "volume"
      target: "/var/lib/postgresql/data"
      source: "nocturne-postgres-data"
      read_only: false
    networks:
    - "aspire"
    configs:
    - source: nocturne-init
      target: /docker-entrypoint-initdb.d/00-init.sh
      mode: 493
  nocturne-api:
    image: "${NOCTURNE_API_IMAGE}"
    environment:
      OTEL_DOTNET_EXPERIMENTAL_OTLP_RETRY: "in_memory"
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"
      HTTP_PORTS: "${NOCTURNE_API_PORT}"
      INSTANCE_KEY: "${INSTANCE_KEY}"
      ConnectionStrings__nocturne-postgres: "Host=nocturne-postgres-server;Port=5432;Database=nocturne;Username=nocturne_app;Password=${POSTGRES_APP_PASSWORD}"
      ConnectionStrings__nocturne-postgres-migrator: "Host=nocturne-postgres-server;Port=5432;Database=nocturne;Username=nocturne_migrator;Password=${POSTGRES_MIGRATOR_PASSWORD}"
      DemoService__Enabled: "false"
      WEB_URL: "http://nocturne-web:8000"
      BASE_DOMAIN: "${BASE_DOMAIN}"
    expose:
    - "${NOCTURNE_API_PORT}"
    depends_on:
      nocturne-postgres-server:
        condition: "service_started"
    networks:
    - "aspire"
  nocturne-web:
    image: "${NOCTURNE_WEB_IMAGE}"
    environment:
      PORT: "8000"
      NOCTURNE_API_HTTP: "http://nocturne-api:${NOCTURNE_API_PORT}"
      services__nocturne-api__http__0: "http://nocturne-api:${NOCTURNE_API_PORT}"
      PUBLIC_API_URL: "http://nocturne-api:${NOCTURNE_API_PORT}"
      NOCTURNE_API_URL: "http://nocturne-api:${NOCTURNE_API_PORT}"
      INSTANCE_KEY: "${INSTANCE_KEY}"
      DISCORD_BOT_TOKEN: "${DISCORD_BOT_TOKEN}"
      DISCORD_PUBLIC_KEY: "${DISCORD_PUBLIC_KEY}"
      DISCORD_APPLICATION_ID: "${DISCORD_APPLICATION_ID}"
      DISCORD_CLIENT_SECRET: "${DISCORD_CLIENT_SECRET}"
      BASE_DOMAIN: "${BASE_DOMAIN}"
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN}"
      TELEGRAM_WEBHOOK_SECRET_TOKEN: "${TELEGRAM_WEBHOOK_SECRET_TOKEN}"
      SLACK_BOT_TOKEN: "${SLACK_BOT_TOKEN}"
      SLACK_SIGNING_SECRET: "${SLACK_SIGNING_SECRET}"
      WHATSAPP_ACCESS_TOKEN: "${WHATSAPP_ACCESS_TOKEN}"
      WHATSAPP_VERIFY_TOKEN: "${WHATSAPP_VERIFY_TOKEN}"
      WHATSAPP_APP_SECRET: "${WHATSAPP_APP_SECRET}"
      WHATSAPP_PHONE_NUMBER_ID: "${WHATSAPP_PHONE_NUMBER_ID}"
      ORIGIN: "https://${BASE_DOMAIN}"
      NOCTURNE_POSTGRES_URI: "postgresql://nocturne_web:${POSTGRES_WEB_PASSWORD}@nocturne-postgres-server:5432/nocturne"
    expose:
    - "8000"
    depends_on:
      nocturne-api:
        condition: "service_started"
    networks:
    - "aspire"
 gateway:
    image: "mcr.microsoft.com/dotnet/nightly/yarp:2.3-preview"
    command:
    - "/app/yarp.dll"
    entrypoint:
    - "dotnet"
    environment:
      ASPNETCORE_ENVIRONMENT: "Production"
      REVERSEPROXY__CLUSTERS__cluster_nocturne-web__HTTPREQUEST__ACTIVITYTIMEOUT: "00:05:00"
      REVERSEPROXY__ROUTES__route0__MATCH__PATH: "/api/auth/oidc/{**catch-all}"
      REVERSEPROXY__ROUTES__route0__CLUSTERID: "cluster_nocturne-api"
      REVERSEPROXY__ROUTES__route0__TRANSFORMS__0__X-Forwarded: "Off"
      REVERSEPROXY__ROUTES__route0__TRANSFORMS__0__HeaderPrefix: "X-Forwarded-"
      REVERSEPROXY__ROUTES__route1__MATCH__PATH: "/api/oauth/{**catch-all}"
      REVERSEPROXY__ROUTES__route1__CLUSTERID: "cluster_nocturne-api"
      REVERSEPROXY__ROUTES__route1__TRANSFORMS__0__X-Forwarded: "Off"
      REVERSEPROXY__ROUTES__route1__TRANSFORMS__0__HeaderPrefix: "X-Forwarded-"
      REVERSEPROXY__ROUTES__route2__MATCH__PATH: "/api/v4/dev-only/{**catch-all}"
      REVERSEPROXY__ROUTES__route2__CLUSTERID: "cluster_nocturne-api"
      REVERSEPROXY__ROUTES__route2__TRANSFORMS__0__X-Forwarded: "Off"
      REVERSEPROXY__ROUTES__route2__TRANSFORMS__0__HeaderPrefix: "X-Forwarded-"
      REVERSEPROXY__ROUTES__route3__MATCH__PATH: "/api/{**catch-all}"
      REVERSEPROXY__ROUTES__route3__CLUSTERID: "cluster_nocturne-web"
      REVERSEPROXY__ROUTES__route3__TRANSFORMS__0__X-Forwarded: "Off"
      REVERSEPROXY__ROUTES__route3__TRANSFORMS__0__HeaderPrefix: "X-Forwarded-"
      REVERSEPROXY__ROUTES__route4__MATCH__PATH: "/auth/bot/{**catch-all}"
      REVERSEPROXY__ROUTES__route4__CLUSTERID: "cluster_nocturne-web"
      REVERSEPROXY__ROUTES__route4__TRANSFORMS__0__X-Forwarded: "Off"
      REVERSEPROXY__ROUTES__route4__TRANSFORMS__0__HeaderPrefix: "X-Forwarded-"
      REVERSEPROXY__ROUTES__route5__MATCH__PATH: "/scalar"
      REVERSEPROXY__ROUTES__route5__CLUSTERID: "cluster_nocturne-api"
      REVERSEPROXY__ROUTES__route5__TRANSFORMS__0__X-Forwarded: "Off"
      REVERSEPROXY__ROUTES__route5__TRANSFORMS__0__HeaderPrefix: "X-Forwarded-"
      REVERSEPROXY__ROUTES__route6__MATCH__PATH: "/scalar/{**catch-all}"
      REVERSEPROXY__ROUTES__route6__CLUSTERID: "cluster_nocturne-api"
      REVERSEPROXY__ROUTES__route6__TRANSFORMS__0__X-Forwarded: "Off"
      REVERSEPROXY__ROUTES__route6__TRANSFORMS__0__HeaderPrefix: "X-Forwarded-"
      REVERSEPROXY__ROUTES__route7__MATCH__PATH: "/openapi/{**catch-all}"
      REVERSEPROXY__ROUTES__route7__CLUSTERID: "cluster_nocturne-api"
      REVERSEPROXY__ROUTES__route7__TRANSFORMS__0__X-Forwarded: "Off"
      REVERSEPROXY__ROUTES__route7__TRANSFORMS__0__HeaderPrefix: "X-Forwarded-"
      REVERSEPROXY__ROUTES__route8__MATCH__PATH: "/.well-known/{**catch-all}"
      REVERSEPROXY__ROUTES__route8__CLUSTERID: "cluster_nocturne-api"
      REVERSEPROXY__ROUTES__route8__TRANSFORMS__0__X-Forwarded: "Off"
      REVERSEPROXY__ROUTES__route8__TRANSFORMS__0__HeaderPrefix: "X-Forwarded-"
      REVERSEPROXY__ROUTES__route9__MATCH__PATH: "/{**catchall}"
      REVERSEPROXY__ROUTES__route9__CLUSTERID: "cluster_nocturne-web"
      REVERSEPROXY__ROUTES__route9__TRANSFORMS__0__X-Forwarded: "Off"
      REVERSEPROXY__ROUTES__route9__TRANSFORMS__0__HeaderPrefix: "X-Forwarded-"
      REVERSEPROXY__CLUSTERS__cluster_nocturne-api__DESTINATIONS__destination1__ADDRESS: "http://nocturne-api"
      REVERSEPROXY__CLUSTERS__cluster_nocturne-web__DESTINATIONS__destination1__ADDRESS: "http://nocturne-web"
      NOCTURNE_API_HTTP: "http://nocturne-api:${NOCTURNE_API_PORT}"
      services__nocturne-api__http__0: "http://nocturne-api:${NOCTURNE_API_PORT}"
      NOCTURNE_WEB_HTTP: "http://nocturne-web:8000"
      services__nocturne-web__http__0: "http://nocturne-web:8000"
    ports:
    - "8080:5000"
    depends_on:
      nocturne-api:
        condition: "service_started"
      nocturne-web:
        condition: "service_started"
    networks:
    - "aspire"
  watchtower:
    image: "ghcr.io/nicholas-fedor/watchtower:latest"
    environment:
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_POLL_INTERVAL: "86400"
      WATCHTOWER_INCLUDE_STOPPED: "false"
      WATCHTOWER_REVIVE_STOPPED: "false"
    volumes:
    - type: "bind"
      target: "/var/run/docker.sock"
      source: "/var/run/docker.sock"
      read_only: false
    networks:
    - "aspire"
networks:
  aspire:
    driver: "bridge"
volumes:
  nocturne-postgres-data:
    driver: "local"
configs:
  nocturne-init:
    content: |
      #!/bin/bash
      # Nocturne PostgreSQL init script (container bootstrap)
      # =====================================================
      #
      # This script runs automatically on first container start (via the standard
      # /docker-entrypoint-initdb.d/ mechanism) for the Aspire dev stack and the
      # self-hosted docker-compose bundle. It creates the nocturne_migrator and
      # nocturne_app roles that Nocturne requires.
      #
      # This runs only against a fresh data directory, so the SQL does not need to
      # be idempotent. For bring-your-own-PostgreSQL deployments where you need
      # idempotency against an existing database, use bootstrap-roles.sql instead.
      #
      # Expected environment variables (set by the compose/AppHost that owns the
      # Postgres container):
      #
      #   POSTGRES_DB                  database name (set by the Postgres image)
      #   POSTGRES_USER                superuser name (set by the Postgres image)
      #   POSTGRES_MIGRATOR_PASSWORD   password for nocturne_migrator
      #   POSTGRES_APP_PASSWORD        password for nocturne_app
      #   POSTGRES_WEB_PASSWORD        password for nocturne_web (bot state)
      #
      # Passwords are passed to psql via -v variables (not shell interpolation
      # inside the SQL text) so that values containing quotes or dollar signs are
      # handled safely by psql's :'var' quoting.

      set -euo pipefail

      : "${POSTGRES_DB:?POSTGRES_DB must be set}"
      : "${POSTGRES_USER:?POSTGRES_USER must be set}"
      : "${POSTGRES_MIGRATOR_PASSWORD:?POSTGRES_MIGRATOR_PASSWORD must be set}"
      : "${POSTGRES_APP_PASSWORD:?POSTGRES_APP_PASSWORD must be set}"
      : "${POSTGRES_WEB_PASSWORD:?POSTGRES_WEB_PASSWORD must be set}"

      psql \
          --username "$POSTGRES_USER" \
          --dbname "$POSTGRES_DB" \
          --set ON_ERROR_STOP=on \
          --set DBNAME="$POSTGRES_DB" \
          --set migrator_password="$POSTGRES_MIGRATOR_PASSWORD" \
          --set app_password="$POSTGRES_APP_PASSWORD" \
          --set web_password="$POSTGRES_WEB_PASSWORD" \
          <<'SQL'
      CREATE ROLE nocturne_migrator LOGIN NOSUPERUSER NOBYPASSRLS NOCREATEDB NOCREATEROLE PASSWORD :'migrator_password';
      CREATE ROLE nocturne_app      LOGIN NOSUPERUSER NOBYPASSRLS NOCREATEDB NOCREATEROLE PASSWORD :'app_password';
      CREATE ROLE nocturne_web      LOGIN NOSUPERUSER NOBYPASSRLS NOCREATEDB NOCREATEROLE PASSWORD :'web_password';

      ALTER DATABASE :"DBNAME" OWNER TO nocturne_migrator;
      ALTER SCHEMA public OWNER TO nocturne_migrator;

      GRANT CONNECT ON DATABASE :"DBNAME" TO nocturne_app;
      GRANT USAGE ON SCHEMA public TO nocturne_app;

      -- nocturne_web: owns its own chat_state_* tables (created on first run by
      -- @chat-adapter/state-pg in the SvelteKit app). Needs CREATE on public. It
      -- does NOT get default privileges on migrator-owned tables, so even a bug
      -- in the web layer can't touch Nocturne's tenant tables.
      GRANT CONNECT ON DATABASE :"DBNAME" TO nocturne_web;
      GRANT USAGE, CREATE ON SCHEMA public TO nocturne_web;

      ALTER DEFAULT PRIVILEGES FOR ROLE nocturne_migrator IN SCHEMA public
          GRANT SELECT, INSERT, UPDATE, DELETE ON TABLES TO nocturne_app;
      ALTER DEFAULT PRIVILEGES FOR ROLE nocturne_migrator IN SCHEMA public
          GRANT USAGE, SELECT ON SEQUENCES TO nocturne_app;
      SQL
