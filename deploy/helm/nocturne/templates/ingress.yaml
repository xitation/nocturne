{{- if .Values.ingress.enabled -}}
{{- $host := .Values.ingress.host -}}
{{- if not $host -}}
{{- fail "ingress.host is required when ingress.enabled=true" -}}
{{- end -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "nocturne.fullname" . }}
  labels: {{- include "nocturne.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations: {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ $host | quote }}
      {{- with .Values.ingress.tls.secretName }}
      secretName: {{ . }}
      {{- end }}
  {{- end }}
  rules:
    - host: {{ $host | quote }}
      http:
        paths:
          {{- with .Values.ingress.api.externalPath }}
          - path: {{ . }}
            pathType: Prefix
            backend:
              service:
                name: {{ include "nocturne.api.fullname" $ }}
                port:
                  name: http
          {{- end }}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "nocturne.web.fullname" . }}
                port:
                  name: http
{{- end }}
