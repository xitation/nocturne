{{- if .Values.postgresql.enabled -}}
{{- if not .Values.postgresql.auth.existingSecret -}}
{{/*
Chart-managed Secret containing the three Nocturne role passwords used in
bundled-Postgres mode. Bitnami's own auth secret (<release>-postgresql) holds
the postgres superuser password, generated by the subchart — we read from it
in the bootstrap Job, but do NOT manage it here.

Password stability across `helm upgrade`: lookup the existing Secret and
reuse its values; missing keys get a fresh randAlphaNum(32). This is the
standard pattern for stable auto-generated passwords without an external
operator.

Caveat: `lookup` returns nothing during `helm template` (offline) or
`helm install --dry-run`, so every render outside a real cluster regenerates
all keys. GitOps users should pre-create the Secret and set
postgresql.auth.existingSecret instead.

Annotated `helm.sh/resource-policy: keep` so `helm uninstall` does not
remove it (a re-install onto the same PVC keeps working).
*/}}
{{- $secretName := include "nocturne.bundledDb.secretName" . -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName -}}
{{- $existingData := dict -}}
{{- if and $existing $existing.data -}}
{{- $existingData = $existing.data -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels: {{- include "nocturne.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-50"
    "helm.sh/hook-delete-policy": before-hook-creation
    "helm.sh/resource-policy": keep
type: Opaque
data:
{{- range $key := list "app-password" "migrator-password" "web-password" }}
  {{ $key }}: {{ default (randAlphaNum 32 | b64enc) (index $existingData $key) }}
{{- end }}
{{- end }}
{{- end }}
