{{- if .Values.demo.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "nocturne.demo.fullname" . }}
  labels:
    {{- include "nocturne.labels" . | nindent 4 }}
    app.kubernetes.io/component: demo
spec:
  replicas: 1
  selector:
    matchLabels: {{- include "nocturne.demo.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels: {{- include "nocturne.demo.selectorLabels" . | nindent 8 }}
      {{- with .Values.demo.podAnnotations }}
      annotations: {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "nocturne.serviceAccountName" . }}
      securityContext: {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets: {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: demo
          image: {{ include "nocturne.demo.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext: {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.demo.containerPort }}
              protocol: TCP
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Production
            - name: HTTP_PORTS
              value: {{ .Values.demo.containerPort | quote }}
            - name: ASPNETCORE_URLS
              value: "http://+:{{ .Values.demo.containerPort }}"
            - name: DemoMode__Enabled
              value: "true"
            - name: DemoMode__BackfillDays
              value: {{ .Values.demo.backfillDays | quote }}
            - name: DemoMode__IntervalMinutes
              value: {{ .Values.demo.intervalMinutes | quote }}
            - name: DemoMode__ResetIntervalMinutes
              value: {{ .Values.demo.resetIntervalMinutes | quote }}
            - name: DemoService__ApiUrl
              value: {{ include "nocturne.api.internalUrl" . | quote }}
            - name: DemoService__AccessMode
              value: {{ .Values.demo.accessMode | quote }}
            - name: INSTANCE_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "nocturne.instanceKeySecretName" . }}
                  key: {{ include "nocturne.instanceKeySecretKey" . }}
          livenessProbe:
            httpGet:
              path: /alive
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources: {{- toYaml .Values.demo.resources | nindent 12 }}
      {{- with .Values.demo.nodeSelector }}
      nodeSelector: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.demo.affinity }}
      affinity: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.demo.tolerations }}
      tolerations: {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
