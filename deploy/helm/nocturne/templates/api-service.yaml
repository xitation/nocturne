apiVersion: v1
kind: Service
metadata:
  name: {{ include "nocturne.api.fullname" . }}
  labels:
    {{- include "nocturne.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: {{ .Values.api.service.type }}
  ports:
    - name: http
      port: {{ .Values.api.service.port }}
      targetPort: http
      protocol: TCP
  selector: {{- include "nocturne.api.selectorLabels" . | nindent 4 }}
